name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Cancel in-progress runs of the same workflow on the same ref.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'        # latest stable 1.x; 1.10 cannot resolve the current
                       # dependency stack (Downloads stdlib pin conflict)
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      # The sibling packages are not yet registered in the General registry, so
      # `develop` them straight from their GitHub URLs before resolving/testing.
      - name: Develop unregistered ecosystem packages
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.develop([
              PackageSpec(url = "https://github.com/JuliaTDA/MetricSpaces.jl"),
              PackageSpec(url = "https://github.com/JuliaTDA/TDAmapper.jl"),
              PackageSpec(url = "https://github.com/JuliaTDA/TDAplots.jl"),
              PackageSpec(url = "https://github.com/JuliaTDA/Ripserer.jl"),
              PackageSpec(url = "https://github.com/JuliaTDA/PersistenceDiagrams.jl"),
              PackageSpec(url = "https://github.com/JuliaTDA/ToMATo.jl"),
            ])
            Pkg.instantiate()'
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true
