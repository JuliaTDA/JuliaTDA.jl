name: Documentation
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  build:
    name: Build & deploy docs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      contents: write       # to push to gh-pages
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      # Develop the unregistered ecosystem packages into BOTH the package and
      # the docs environments before building the site.
      - name: Develop unregistered ecosystem packages
        run: |
          julia --project=docs -e '
            using Pkg
            # JuliaTDA itself must be in the SAME develop call as the siblings:
            # a separate first call fails to resolve because JuliaTDA is an
            # unregistered dep of the docs env with no source yet.
            Pkg.develop([
              PackageSpec(url = "https://github.com/JuliaTDA/MetricSpaces.jl"),
              PackageSpec(url = "https://github.com/JuliaTDA/TDAmapper.jl"),
              PackageSpec(url = "https://github.com/JuliaTDA/TDAplots.jl"),
              PackageSpec(url = "https://github.com/JuliaTDA/Ripserer.jl"),
              PackageSpec(url = "https://github.com/JuliaTDA/PersistenceDiagrams.jl"),
              PackageSpec(url = "https://github.com/JuliaTDA/ToMATo.jl"),
              PackageSpec(path = pwd()),
            ])
            Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}          # for gh-pages deploy
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}       # optional SSH deploy key
        run: julia --project=docs docs/make.jl
